services:
  database:
    container_name: db
    restart: unless-stopped
    image: mysql:8.0
    environment:
      MYSQL_RANDOM_ROOT_PASSWORD: true
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$$MYSQL_USER -p$$MYSQL_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks:
      - backend-network
    
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: api
    restart: unless-stopped
    hostname: api
    environment:
      DB_HOST: database
      DB_PORT: 3306
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      PORT: 3000
    expose:
      - "3000"
    depends_on:
      database:
        condition: service_healthy
    networks:
      - backend-network
      - frontend_network

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: web
    restart: unless-stopped
    hostname: web
    ports:
      - "5173:5173"
    environment:
      VITE_API_PROXY_TARGET: http://api:3000
    depends_on:
      - api
    networks:
      - frontend_network
      
networks:
  backend-network:
    driver: bridge
  frontend_network:
    driver: bridge

volumes:
  mysql_data:
