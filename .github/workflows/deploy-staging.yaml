name: StockHub | Deploy Staging

on:
  workflow_run:
    workflows: ["StockHub | CI Workflow"]
    types: [completed]
  workflow_dispatch:
    inputs:
      backend_version:
        description: "Indiquer la version de l'image du backend (ex: 1.0)"
        required: true
        type: string
      frontend_version:
        description: "Indiquer la version de l'image du frontend (ex: 1.0)"
        required: true
        type: string

permissions:
  contents: read
  packages: write
  
jobs:
  push-backend-image:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    
    name: Build and push Backend image
    runs-on: ubuntu-latest

    steps:
      - name: Set image version
        run: echo "IMAGE_VERSION=${{ github.event_name == 'workflow_dispatch' && inputs.backend_version || github.sha }}" >> $GITHUB_ENV

      - name: Cloning the repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          file: ./backend/Dockerfile
          tags: |
            ghcr.io/${{ github.actor }}/stockhub-backend:${{ env.IMAGE_VERSION }}
            ghcr.io/${{ github.actor }}/stockhub-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  push-frontend-image:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    name: Build and push Frontend image
    runs-on: ubuntu-latest

    steps:
      - name: Set image version
        run: echo "IMAGE_VERSION=${{ github.event_name == 'workflow_dispatch' && inputs.frontend_version || github.sha }}" >> $GITHUB_ENV
        
      - name: Cloning the repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          file: ./frontend/Dockerfile
          tags: |
            ghcr.io/${{ github.actor }}/stockhub-frontend:${{ env.IMAGE_VERSION }}
            ghcr.io/${{ github.actor }}/stockhub-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-staging:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    needs: [push-backend-image, push-frontend-image]

    name: Deploy to Staging
    runs-on: ubuntu-latest

    steps:
      - name: Cloning the repository
        uses: actions/checkout@v4

      - name: Setup VPN
        uses: ./.github/actions/vpn
        with:
          host: "${{ secrets.VPN_IP }}"
          port: "443"
          username: "${{ secrets.VPN_USERNAME }}"
          password: "${{ secrets.VPN_PASSWORD }}"
          ping_host: ${{ secrets.STAGING_HOST }}

      - name: Sending files to the staging server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.SSH_STAGING_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "./deploy/staging/*,./docker-compose.yaml,./docker-compose.staging.yaml"
          target: ~/tpi-stockhub/
          port: ${{ secrets.SSH_STAGING_PORT }}

      - name: Building the containers on the staging server
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.SSH_STAGING_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_STAGING_PORT }}
          # Récupération des images, arrêt des conteneurs, puis redémarrage avec les nouvelles images
          # Seed de la base de données
          script: |
            rm *.tar.gz
            cd ~/staging-stockhub/

            export BACKEND_VERSION=${{ github.event_name == 'workflow_dispatch' && inputs.backend_version || github.sha }}
            export FRONTEND_VERSION=${{ github.event_name == 'workflow_dispatch' && inputs.frontend_version || github.sha }}


            docker compose -f docker-compose.yaml -f docker-compose.staging.yaml down
            docker compose -f docker-compose.yaml -f docker-compose.staging.yaml pull
            docker compose -f docker-compose.yaml -f docker-compose.staging.yaml up -d

            docker compose exec api node dist/seed.js

  # Ajouter le nettoyage des images inutilisées sur la machine distante