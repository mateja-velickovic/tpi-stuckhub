name: StockHub | Deploy Staging

on:
  workflow_run:
    workflows: ["StockHub | CI Workflow"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  
jobs:
  # Ajouter versions
  push-backend-image:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    name: Build and push Backend image
    runs-on: ubuntu-latest

    steps:
      - name: Cloning the repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          file: ./backend/Dockerfile
          tags: ghcr.io/${{ github.actor }}/stockhub-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Ajouter versions
  push-frontend-image:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    name: Build and push Frontend image
    runs-on: ubuntu-latest

    steps:
      - name: Cloning the repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          file: ./frontend/Dockerfile
          tags: ghcr.io/${{ github.actor }}/stockhub-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-staging:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    name: Deploy to Staging
    runs-on: ubuntu-latest

    steps:
      - name: Cloning the repository
        uses: actions/checkout@v4

      - name: Setup VPN
        uses: ./.github/actions/vpn
        with:
          host: "${{ secrets.VPN_IP }}"
          port: "443"
          username: "${{ secrets.VPN_USERNAME }}"
          password: "${{ secrets.VPN_PASSWORD }}"
          ping_host: ${{ secrets.STAGING_HOST }}