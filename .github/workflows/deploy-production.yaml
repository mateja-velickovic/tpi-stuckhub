name: StockHub | Deploy Production

on:
  workflow_dispatch:
    inputs:
      image_version:
        description: "Indiquer la version des images (par défaut : commit SHA)"
        required: true
        type: string

permissions:
  contents: read
  packages: write
  
jobs:
  push-backend-image:
    name: Build and push Backend image
    runs-on: ubuntu-latest

    steps:
      - name: Set image version
        run: echo "IMAGE_VERSION=${{ github.event_name == 'workflow_dispatch' && inputs.image_version || github.sha }}" >> $GITHUB_ENV

      - name: Cloning the repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          file: ./backend/Dockerfile
          tags: |
            ghcr.io/${{ github.actor }}/stockhub-backend:${{ env.IMAGE_VERSION }}
            ghcr.io/${{ github.actor }}/stockhub-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  push-frontend-image:
    name: Build and push Frontend image
    runs-on: ubuntu-latest

    steps:
      - name: Set image version
        run: echo "IMAGE_VERSION=${{ github.event_name == 'workflow_dispatch' && inputs.image_version || github.sha }}" >> $GITHUB_ENV
        
      - name: Cloning the repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          file: ./frontend/Dockerfile
          tags: |
            ghcr.io/${{ github.actor }}/stockhub-frontend:${{ env.IMAGE_VERSION }}
            ghcr.io/${{ github.actor }}/stockhub-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-staging:
    needs: [push-backend-image, push-frontend-image]

    name: Deploy to Production
    runs-on: ubuntu-latest

    steps:
      - name: Cloning the repository
        uses: actions/checkout@v4

      - name: Building the containers on the production server
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.SSH_PRODUCTION_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PRODUCTION_PORT }}
          script: ls
          # Récupération des images, arrêt des conteneurs, puis redémarrage avec les nouvelles images
          # Seed de la base de données - docker compose exec api node dist/seed.js
          # script: ls
            # cd ~/prod-stockhub/

            # export IMAGE_VERSION=${{ github.event_name == 'workflow_dispatch' && inputs.image_version || github.sha }}
            # docker compose -f docker-compose.yaml -f docker-compose.staging.yaml -f docker-compose.prod.yaml down
            # docker compose -f docker-compose.yaml -f docker-compose.staging.yaml -f docker-compose.prod.yaml pull
            # docker compose -f docker-compose.yaml -f docker-compose.staging.yaml -f docker-compose.prod.yaml up -d

      - name: Sending files to the production server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.SSH_PRODUCTION_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "./docker-compose.yaml,./docker-compose.staging.yaml,./docker-compose.prod.yaml"
          target: ~/prod-stockhub/
          port: ${{ secrets.SSH_PRODUCTION_PORT }}

  # Ajouter le nettoyage des images inutilisées sur la machine distante